<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>REE Map</title>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet" />

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
    }

    #map {
        width: 100%;
        height: 100vh;
    }
</style>
</head>

<body>

<div id="map"></div>

<script>
mapboxgl.accessToken =
"pk.eyJ1IjoibGlhbnM3NyIsImEiOiJjbWt6NGxhMjcwZTJsM2Vwd2RtbWVvZHRuIn0.HDVAEM1yBC3D51XX3B4NPw";

const map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/mapbox/dark-v10",
    center: [10, 20],
    zoom: 1.6,
    minZoom: 1,
    maxZoom: 9
});

map.on("load", () => {

    // Country boundaries source
    map.addSource("countries", {
        type: "vector",
        url: "mapbox://mapbox.country-boundaries-v1"
    });

    // Outline layer
    map.addLayer({
        id: "country-outline",
        type: "line",
        source: "countries",
        "source-layer": "country_boundaries",
        paint: {
            "line-color": "rgba(255,255,255,0.25)",
            "line-width": 1
        },
        filter: [
            "all",
            ["==", ["get", "disputed"], "false"],
            [
                "any",
                ["==", "all", ["get", "worldview"]],
                ["in", "US", ["get", "worldview"]]
            ]
        ]
    });

    // Your REE GeoJSON source
    map.addSource("minerals", {
        type: "geojson",
        data: "assets/ree.geojson"
    });

    // Point layer
    map.addLayer({
        id: "mineral-points",
        type: "circle",
        source: "minerals",
        paint: {
            "circle-radius": 6,
            "circle-color": "#00ffff",
            "circle-opacity": 0.8
        }
    });

});
</script>

</body>
</html>
